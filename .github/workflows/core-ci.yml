name: CatEx CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: catex-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,web]"

      - name: Check formatting
        run: python -m ruff format --check src tests

      - name: Lint
        run: python -m ruff check .

      - name: Test with coverage gate
        run: >-
          python -m pytest
          --cov=catex
          --cov-report=term
          --cov-fail-under=90
          -q

      - name: Build source and wheel distributions
        run: python -m build

  web:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm

      - name: Install locked frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check frontend
        run: pnpm web:check

      - name: Check Windows launcher syntax
        run: node --check scripts/start_web_poc.mjs

      - name: Test frontend
        run: pnpm web:test

      - name: Build frontend
        run: pnpm web:build
